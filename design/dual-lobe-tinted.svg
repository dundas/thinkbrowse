<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- ThinkBrowse Dual Lobe - Tinted Mode (Monochrome) -->
  <!-- We use a single color for everything to allow system tinting -->
  
  <!-- Left Lobe (Full fill) -->
  <path d="M240 100 C150 100, 80 170, 80 260 C80 350, 150 420, 240 420 L240 100 Z" fill="currentColor" />
  
  <!-- Right Lobe (Outline or slightly offset fill for contrast in mono) -->
  <!-- For tinted mode, Apple usually prefers a solid silhouette. -->
  <path d="M272 100 C362 100, 432 170, 432 260 C432 350, 362 420, 272 420 L272 100 Z" fill="currentColor" opacity="0.6" />
  
  <!-- Shared Spark (Cutout for tinted mode) -->
  <circle cx="256" cy="260" r="30" fill="none" stroke="currentColor" stroke-width="8" />
</svg>
